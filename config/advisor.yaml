# Strategy parameters
strategy:
  min_hold_period_days: 365
  churn_bias: low
  max_position_pct: 15
  trim_trigger_pct: 30
  conviction_promotion_weeks: 3
  moonshot_max_pct: 3
  min_cagr_pct: 25
  min_margin_of_safety_pct: 15
  min_evidence_sources: 3

# Earnings intelligence
earnings:
  transcript_source: fmp
  lookback_quarters: 4
  cross_mention_tracking: true

# Prediction markets
prediction_markets:
  polymarket: true
  kalshi: true
  min_volume_usd: 100000
  alert_delta_pct: 10
  tracked_categories:
    - fed_policy
    - recession
    - regulation
    - trade_war
    - fiscal_policy

# Conviction hierarchy weights (must sum to 1.0)
conviction_weights:
  company_guidance: 0.30
  crowd_sentiment: 0.25
  smart_money: 0.20
  fundamentals: 0.15
  analyst_consensus: 0.10

# Screening (reused from Alpha Scout)
screening:
  max_candidates: 50
  top_n_for_synthesis: 20

# Output limits
output:
  max_conviction_list: 5
  max_moonshots: 2
