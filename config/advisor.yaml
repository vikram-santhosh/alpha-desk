# Strategy parameters
strategy:
  min_hold_period_days: 365
  churn_bias: low
  max_position_pct: 15
  trim_trigger_pct: 30
  conviction_promotion_weeks: 3
  moonshot_max_pct: 3
  min_cagr_pct: 25
  min_margin_of_safety_pct: 15
  min_evidence_sources: 2

# Earnings intelligence
earnings:
  transcript_source: fmp
  lookback_quarters: 4
  cross_mention_tracking: true

# Prediction markets
prediction_markets:
  polymarket: true
  kalshi: true
  min_volume_usd: 100000
  alert_delta_pct: 10
  tracked_categories:
    - fed_policy
    - recession
    - regulation
    - trade_war
    - fiscal_policy

# Conviction hierarchy weights (must sum to 1.0)
conviction_weights:
  company_guidance: 0.30
  crowd_sentiment: 0.25
  smart_money: 0.20
  fundamentals: 0.15
  analyst_consensus: 0.10

# Screening (reused from Alpha Scout)
screening:
  max_candidates: 50
  top_n_for_synthesis: 20

# Moonshot archetype thresholds and seed candidates
moonshot:
  # Small-cap disruptor
  disruptor_max_market_cap: 30000000000
  disruptor_min_rev_growth: 0.30
  disruptor_min_sentiment: 40
  # Catalyst-driven (must be sub-$50B -- mega-caps are not moonshots)
  catalyst_min_composite: 45
  catalyst_max_market_cap: 50000000000
  # Contrarian turnaround (must be sub-$50B)
  turnaround_max_pct_from_high: -30
  turnaround_min_sentiment: 50
  turnaround_max_market_cap: 50000000000

  # Pre-IPO proxy plays (unlisted company exposure via public equities)
  # NOTE: MSFT, GOOG, AMZN are already core holdings — their OpenAI/Anthropic
  # exposure is captured in the holdings thesis, not as moonshot seeds.
  pre_ipo_proxies:
    - ticker: RKLB
      exposure: "SpaceX adjacent — only pure-play orbital launch competitor"
    - ticker: SOUN
      exposure: "Voice AI pure-play — proxy for conversational AI adoption"

  # Commodity / collectible plays
  commodity_tickers:
    - ticker: GLD
      exposure: "Gold ETF — inflation hedge, central bank accumulation"
    - ticker: SLV
      exposure: "Silver ETF — industrial + monetary demand"
    - ticker: BITO
      exposure: "Bitcoin futures ETF — crypto exposure"

  # Thematic sector plays
  thematic_sectors:
    space_tech: [RKLB, ASTS, LUNR, RDW, MNTS]
    quantum_computing: [IONQ, RGTI, QBTS]
    nuclear_energy: [SMR, OKLO, NNE, LEU]
    robotics_ai: [PLTR, PATH, SERV]

# Output limits
output:
  max_conviction_list: 5
  max_moonshots: 2

# ═══════════════════════════════════════════════════
# v2 Architecture Settings
# ═══════════════════════════════════════════════════

# Analyst Committee — multi-perspective analysis pipeline
committee:
  enabled: true
  growth_analyst: true
  value_analyst: true
  risk_officer: true
  deep_research_analyst: true
  editor_model: "claude-opus-4-6"
  analyst_model: "claude-opus-4-6"
  max_tokens_per_analyst: 3500
  max_tokens_editor: 4000
  max_tokens_deep_research: 8000
  # Max tickers for deep research (priority 1 = full blocks)
  deep_research_max_tickers: 6
  # Minimum |change%| to auto-include in deep research
  deep_research_move_threshold: 2.0
  # Max tickers receiving full prose research (rest get compact summaries)
  deep_research_full_max: 3

# Delta Engine — "what changed" detection
delta_engine:
  enabled: true
  significance_thresholds:
    price_high_pct: 5.0
    price_medium_pct: 2.0
    vix_high_delta: 3.0
    treasury_high_delta: 0.10

# Catalyst Calendar
catalyst_tracker:
  enabled: true
  scan_news_for_catalysts: true
  fomc_dates_2026:
    - "2026-01-29"
    - "2026-03-19"
    - "2026-05-07"
    - "2026-06-18"
    - "2026-07-30"
    - "2026-09-17"
    - "2026-11-05"
    - "2026-12-17"

# Evidence Weighting — base weights by source type
evidence_weighting:
  insider_purchase_large: 5.0
  insider_purchase_small: 3.5
  insider_selling_large: -4.0
  earnings_guidance_raised: 5.0
  earnings_guidance_maintained: 2.0
  earnings_guidance_lowered: -3.0
  superinvestor_new_position: 3.0
  superinvestor_existing: 1.0
  reddit_strong_positive: 2.5
  reddit_moderate_positive: 1.0
  reddit_negative: -1.5
  fundamentals_strong: 4.0
  fundamentals_moderate: 2.0
  fundamentals_weak: -2.0
  valuation_attractive: 4.0
  valuation_fair: 1.5
  valuation_stretched: -2.0
  recency_full_days: 14
  recency_moderate_days: 30
  recency_weak_days: 60
  recency_minimal_days: 90

# Outcome Tracking
outcome_tracking:
  enabled: true
  auto_close_after_days: 180
  universal_stop_loss_pct: -20

# Weekly Retrospective — self-improving feedback loop
retrospective:
  enabled: true
  schedule_day: "sunday"
  lookback_days: 30

# Backtesting
backtest:
  default_days: 5
  skip_agents: [street_ear, news_desk]
  output_dir: backtests
  extra_history_days: 30

# Delivery channels
delivery:
  telegram:
    enabled: true
  email:
    enabled: false
    send_verbose: true

# ═══════════════════════════════════════════════════
# v3 Architecture Features
# ═══════════════════════════════════════════════════

# Reasoning Journal — tracks thesis accuracy over time
reasoning_journal:
  enabled: true
  weekly_evaluation_day: "sunday"

# Interactive Chat — Q&A about daily brief via Telegram
chat:
  enabled: true
  session_expiry_hours: 4
  max_history_messages: 10

# User Feedback — shapes future analysis
feedback:
  enabled: true

# Causal Reasoner — decomposes theses into assumption chains
causal_reasoner:
  enabled: true
  model: "claude-opus-4-6"
  max_tickers: 5

# Event Detector — extracts future-dated events from news
event_detector:
  enabled: true
  min_relevance: 7
  dedup_days: 3

# Gap Resolver — fetches missing data flagged by analysts
gap_resolver:
  enabled: true
  model: "claude-haiku-4-5"
  max_gaps: 5
  timeout_seconds: 45

# Scoring weights for composite score (must sum to 1.0)
scoring_weights:
  growth: 0.25
  value: 0.25
  risk: 0.15
  catalyst_proximity: 0.15
  novelty: 0.10
  diversification: 0.10
